services:
  - type: web
    name: est-razgovor
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci --include=dev && npm run build
    startCommand: node dist/standalone/server.js
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22.13.0"
      - key: HOST
        value: "0.0.0.0"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4.1-mini
      - key: APP_URL
        value: https://est-razgovor.onrender.com
