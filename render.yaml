services:
  - type: web
    name: est-razgovor
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci --include=dev && npm run build
    startCommand: node dist/standalone/server.js
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22.13.0"
      - key: HOST
        value: "0.0.0.0"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
